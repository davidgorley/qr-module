<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Module - Admin</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🎯 QR Module - Room Management</h1>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>

        <div class="add-room-section">
            <button onclick="openCreateRoomModal()" class="btn-create">Create Room</button>
        </div>

        <div class="rooms-controls">
            <div class="search-wrap">
                <input type="search" id="searchInput" placeholder="Search rooms by name or ID">
                <button id="clearSearchBtn" class="btn-clear" title="Clear search">✕</button>
                <span id="resultsCount" class="results-count" aria-live="polite"></span>
            </div>

            <div class="sort-buttons" role="tablist" aria-label="Sort rooms">
                <button class="sort-btn active" data-sort="created_desc">Newest</button>
                <button class="sort-btn" data-sort="created_asc">Oldest</button>
                <button class="sort-btn" data-sort="name_asc">Name A→Z</button>
                <button class="sort-btn" data-sort="name_desc">Name Z→A</button>
                <button class="sort-btn" data-sort="enabled_first">Enabled First</button>
            </div>
        </div>

        <!-- Pending Approvals Section (shown only if approval required) -->
        <div id="pendingSection" class="pending-section" style="display: none;">
            <h2>⏳ Pending Approvals</h2>
            <div id="pendingList" class="pending-list"></div>
        </div>

        <div id="roomsList" class="rooms-grid"></div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Upload Images</h2>
            <input type="file" id="modalFileInput" accept="image/*" multiple>
            <div id="modalPreview" class="modal-preview"></div>
            <button onclick="uploadFromModal()" class="btn-upload-modal">Upload Images</button>
            <div id="modalStatus" class="modal-status"></div>
        </div>
    </div>

    <!-- Create Room Modal -->
    <div id="createRoomModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCreateRoomModal()">&times;</span>
            <h2>Create New Room</h2>
            <form onsubmit="submitCreateRoom(event)" id="createRoomForm">
                <div class="form-group">
                    <label for="roomUnit">Unit:</label>
                    <input type="text" id="roomUnit" placeholder="e.g. GT MS" required maxlength="50">
                </div>
                <div class="form-group">
                    <label for="roomNumber">Room Number:</label>
                    <input type="text" id="roomNumber" placeholder="e.g. 5201" required maxlength="50">
                </div>
                <div class="form-group">
                    <label for="roomBed">Bed:</label>
                    <input type="text" id="roomBed" placeholder="e.g. 1" required maxlength="50">
                </div>
                <button type="submit" class="btn-create">Create Room</button>
                <div id="createRoomStatus" class="modal-status"></div>
            </form>
        </div>
    </div>

    <script>
        const serverUrl = '{{ server_url }}';
        const approvalRequired = {{ approval_required|lower }};
    </script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
